name: Validate UI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - run: npm ci
      - run: npm test -- --no-watch --no-progress
      - run: npm run build
      - run: npx wrangler deploy --dry-run --outdir /tmp/worker-dry-run
