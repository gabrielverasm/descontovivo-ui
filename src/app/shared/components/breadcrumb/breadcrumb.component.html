<nav class="breadcrumb" aria-label="Breadcrumb">
  @for (item of items; track item.label; let last = $last) {
    @if (item.route) {
      <a [routerLink]="item.route">{{ item.label }}</a>
    } @else {
      <span>{{ item.label }}</span>
    }
    @if (!last) {
      <span aria-hidden="true">/</span>
    }
  }
</nav>
