@if (!imageUnavailable) {
  <img
    [src]="promotion.imageUrl"
    [alt]="imageAlt"
    width="320"
    height="320"
    [attr.loading]="isDetailVariant ? 'eager' : 'lazy'"
    [attr.fetchpriority]="isDetailVariant ? 'high' : null"
    decoding="async"
    (error)="markImageUnavailable()"
  />
} @else {
  <span>Produto sem imagem</span>
}
