<article
  class="promotion-card"
  role="link"
  tabindex="0"
  [attr.aria-label]="'Ver detalhes da promoção ' + promotion.title"
  (click)="openDetails()"
  (keydown)="openDetailsFromKeyboard($event)"
>
  <app-promotion-image [promotion]="promotion" />

  <div class="promotion-card__content">
    <div class="promotion-card__title-row">
      <h2>{{ promotion.title }}</h2>

      <div class="promotion-card__publisher">
        <span
          class="promotion-card__publisher-avatar"
          [attr.aria-label]="'Publicado por ' + publisher.name"
        >
          <img *ngIf="publisher.avatarUrl" [src]="publisher.avatarUrl" [alt]="publisher.name" loading="lazy" />
          <span class="promotion-card__publisher-tooltip">{{ publisher.name }}</span>
        </span>
        <span>{{ publishedAgo }}</span>
      </div>
    </div>

    <p>{{ promotion.description }}</p>

    <div class="promotion-card__top-row">
      <app-promotion-trust-signals
        [promotion]="promotion"
        aria-label="Sinais da promoção"
      ></app-promotion-trust-signals>

      <app-promotion-context [promotion]="promotion"></app-promotion-context>
    </div>

    <div class="promotion-card__deal-row">
      <div class="promotion-card__deal-main">
        <div class="promotion-card__prices">
          <app-promotion-price [promotion]="promotion" />

          <app-promotion-vote-buttons
            [promotion]="promotion"
            aria-label="Avaliar preço da promoção"
          ></app-promotion-vote-buttons>
        </div>

        <div class="promotion-card__actions" aria-label="Ações da promoção">
          <a
            class="promotion-card__offer-link promotion-card__offer-link--primary"
            [routerLink]="['/promocoes', promotion.id]"
            (click)="$event.stopPropagation()"
            >Ver detalhes</a
          >
          <a
            class="promotion-card__offer-link promotion-card__offer-link--secondary"
          [href]="promotion.offerUrl || promotion.storeUrl"
          target="_blank"
          rel="noopener noreferrer"
            (click)="$event.stopPropagation()"
            >{{ externalOfferLabel }}</a
          >
        </div>
      </div>

      <p class="promotion-card__comment-preview">
        {{ actualCommentsCount }} comentários: {{ latestCommentPreview }}
      </p>
    </div>
  </div>
</article>
