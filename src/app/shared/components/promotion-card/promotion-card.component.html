<article class="promotion-card">
  <a
    class="promotion-card__image"
    [routerLink]="['/promocoes', promotion.id]"
    [attr.aria-label]="promotion.title"
  >
    <img [src]="promotion.imageUrl" [alt]="promotion.title" loading="lazy" />
  </a>

  <div class="promotion-card__content">
    <div class="promotion-card__meta">
      <span>{{ promotion.storeName }}</span>
      <span>{{ promotion.category }}</span>
    </div>

    <h2>
      <a [routerLink]="['/promocoes', promotion.id]">{{ promotion.title }}</a>
    </h2>

    <p>{{ promotion.description }}</p>

    <app-promotion-trust-signals
      [promotion]="promotion"
      aria-label="Sinais da promoção"
    ></app-promotion-trust-signals>

    <div class="promotion-card__deal-row">
      <div class="promotion-card__prices">
        <strong>{{ promotion.currentPrice | currency: 'BRL' }}</strong>
        <span class="promotion-card__original-price" *ngIf="promotion.originalPrice">
          {{ promotion.originalPrice | currency: 'BRL' }}
        </span>
        <small *ngIf="promotion.discountPercentage"> -{{ promotion.discountPercentage }}% </small>

        <app-promotion-vote-buttons
          [promotion]="promotion"
          aria-label="Avaliar preço da promoção"
        ></app-promotion-vote-buttons>
      </div>

      <app-promotion-context [promotion]="promotion"></app-promotion-context>
    </div>

    <div class="promotion-card__footer">
      <div class="promotion-card__tags" aria-label="Tags da promoção">
        <span *ngFor="let tag of promotion.tags">#{{ tag }}</span>
      </div>

      <div class="promotion-card__actions">
        <span>{{ promotion.commentsCount }} comentários</span>
        <a
          [href]="promotion.offerUrl || promotion.storeUrl"
          target="_blank"
          rel="noopener noreferrer"
          >Ver oferta</a
        >
      </div>
    </div>
  </div>
</article>
