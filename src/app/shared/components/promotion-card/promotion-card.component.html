<article
  class="promotion-card"
  role="link"
  tabindex="0"
  [attr.aria-label]="'Ver detalhes da promoção ' + promotion.title"
  (click)="openDetails()"
  (keydown)="openDetailsFromKeyboard($event)"
>
  <app-promotion-image [promotion]="promotion" />

  <div class="promotion-card__content">
    <div class="promotion-card__title-row">
      <h2>{{ promotion.title }}</h2>

      <div class="promotion-card__publisher">
        <span
          class="promotion-card__publisher-avatar"
          [style.background]="publisherAvatarColor"
          [attr.aria-label]="'Publicado por ' + publisherName"
          [title]="publisherName"
        >
          <span aria-hidden="true">{{ publisherInitial }}</span>
        </span>
        <span class="promotion-card__publisher-name" [title]="publisherName">{{ publisherShortName }}</span>
        <time class="promotion-card__published-time" [attr.datetime]="publishedDateISO" [attr.title]="publishedDateFull">{{ publishedAgo }}</time>
      </div>
    </div>

    @if (isAmazonFulfillment) {
      <div class="promotion-card__trust-badges" aria-label="Sinais de confiança">
        <a
          class="promotion-card__trust-badge promotion-card__trust-badge--prime"
          routerLink="/servicos"
          fragment="amazon-prime"
          [attr.aria-label]="amazonTrustLabel + '. Entender Amazon Prime'"
          [attr.title]="amazonTrustLabel + '. Entender Amazon Prime'"
          (click)="$event.stopPropagation()"
        >
          <img
            src="/brand/shield-prime.svg"
            alt=""
            aria-hidden="true"
            loading="lazy"
            decoding="async"
          />
        </a>
      </div>
    }

    <div class="promotion-card__top-row">
      <app-promotion-trust-signals
        [promotion]="promotion"
        aria-label="Sinais da promoção"
      ></app-promotion-trust-signals>

      <app-promotion-context [promotion]="promotion"></app-promotion-context>
    </div>

    <div class="promotion-card__deal-row">
      <div class="promotion-card__deal-main">
        <div class="promotion-card__prices">
          <app-promotion-price [promotion]="promotion" />

          <app-promotion-vote-buttons
            [promotion]="promotion"
            aria-label="Avaliar preço da promoção"
          ></app-promotion-vote-buttons>
        </div>

        <div class="promotion-card__actions" aria-label="Ações da promoção">
          <button
            type="button"
            class="promotion-card__share-btn"
            aria-label="Compartilhar promoção"
            title="Compartilhar promoção"
            (click)="share($event)"
          >
            <span class="promotion-card__share-icon" aria-hidden="true"></span>
          </button>
          @if (externalOfferUrl) {
            <a
              class="promotion-card__offer-link"
              [href]="externalOfferUrl"
              target="_blank"
              rel="nofollow sponsored noopener noreferrer"
              (click)="$event.stopPropagation()"
              >{{ externalOfferLabel }}</a
            >
          }
          <a
            class="promotion-card__offer-link promotion-card__offer-link--primary"
            [routerLink]="['/promocoes', detailId]"
            (click)="$event.stopPropagation()"
            >Ver detalhes</a
          >
        </div>
      </div>

      <p class="promotion-card__comment-preview">
        <span class="promotion-card__comment-count">{{ commentsLabelShort }}</span>
      </p>
    </div>
  </div>
</article>
