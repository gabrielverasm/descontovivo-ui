<span
  *ngIf="hasDealSignal"
  class="promotion-signal promotion-signal--deal"
  [attr.aria-label]="dealSignalLabel"
  [attr.title]="dealSignalLabel"
  tabindex="0"
>
  <img src="/brand/discount-tag.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
</span>

<span
  *ngIf="hasReviewSignal"
  class="promotion-signal promotion-signal--review"
  [class.promotion-signal--trusted-marketplace]="isTrustedMarketplaceSignal"
  [attr.aria-label]="reviewSignalLabel"
  [attr.title]="reviewSignalTitle"
  tabindex="0"
>
  <img
    *ngIf="isTrustedMarketplaceSignal; else reviewShield"
    src="/brand/trusted-marketplace.svg"
    alt=""
    aria-hidden="true"
    loading="lazy"
    decoding="async"
  />
  <ng-template #reviewShield>
    <img src="/brand/shield.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
  </ng-template>
</span>

<span
  *ngIf="promotion.warningBadge && isShippingWarning"
  class="promotion-signal promotion-signal--shipping"
  [attr.aria-label]="warningBadgeDescription"
  [attr.title]="warningBadgeDescription"
  tabindex="0"
>
  <img src="/brand/orange-truck.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
</span>

<span
  *ngIf="promotion.warningBadge && isMarketplaceWarning"
  class="promotion-signal promotion-signal--warning"
  [attr.aria-label]="warningBadgeDescription"
  [attr.title]="warningBadgeDescription"
  tabindex="0"
>
  <img src="/brand/exclamacao.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
</span>

<span
  *ngIf="promotion.warningBadge && !isShippingWarning && !isMarketplaceWarning"
  class="promotion-badge promotion-badge--warning"
  [attr.aria-label]="warningBadgeDescription"
  [attr.title]="warningBadgeDescription"
  tabindex="0"
>
  {{ promotion.warningBadge }}
</span>

<span
  *ngIf="promotion.couponCode"
  class="promotion-badge promotion-badge--coupon"
  [attr.aria-label]="couponBadgeDescription"
  [attr.title]="couponBadgeDescription"
  tabindex="0"
>
  Cupom: {{ promotion.couponCode }}
</span>

<a
  *ngIf="promotion.shippingInfo === 'Prime'"
  class="promotion-badge promotion-badge--prime"
  routerLink="/servicos"
  fragment="amazon-prime"
  aria-label="Entender Amazon Prime"
  title="Entender Amazon Prime"
  (click)="$event.stopPropagation()"
>
  Prime
</a>
