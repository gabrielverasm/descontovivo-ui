@if (isSoldAndDeliveredBySameStore) {
  <a
    class="promotion-badge promotion-badge--trust"
    routerLink="/transparencia"
    fragment="selo-vendido-entregue"
    [attr.aria-label]="soldAndDeliveredTitle"
    [attr.title]="soldAndDeliveredTitle"
    (click)="$event.stopPropagation()"
  >
    Vendido e entregue
  </a>
}

@if (isMarketplaceSeller) {
  <a
    class="promotion-badge promotion-badge--marketplace"
    routerLink="/transparencia"
    fragment="selo-marketplace"
    [attr.aria-label]="marketplaceTitle"
    [attr.title]="marketplaceTitle"
    (click)="$event.stopPropagation()"
  >
    Marketplace
  </a>
}

@if (hasCoupon) {
  <a
    class="promotion-badge promotion-badge--coupon"
    routerLink="/transparencia"
    fragment="selo-cupom"
    [attr.aria-label]="couponTitle"
    [attr.title]="couponTitle"
    (click)="$event.stopPropagation()"
  >
    Cupom: {{ promotion.couponCode }}
  </a>
}
