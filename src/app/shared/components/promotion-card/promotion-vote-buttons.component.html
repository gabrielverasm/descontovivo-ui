<button
  class="promotion-vote promotion-vote--like"
  type="button"
  aria-label="Curti o preço"
  [class.is-active]="userPriceVote === 'like'"
  [attr.aria-pressed]="userPriceVote === 'like'"
  [attr.title]="localLikesCount + ' pessoas curtiram o preço'"
  (click)="$event.stopPropagation(); toggleLikePrice()"
>
  <img src="/brand/like.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
  <span>{{ localLikesCount }}</span>
</button>

<button
  class="promotion-vote promotion-vote--dislike"
  type="button"
  aria-label="Não curti o preço"
  [class.is-active]="userPriceVote === 'dislike'"
  [attr.aria-pressed]="userPriceVote === 'dislike'"
  [attr.title]="localDislikesCount + ' pessoas não curtiram o preço'"
  (click)="$event.stopPropagation(); toggleDislikePrice()"
>
  <img src="/brand/dislike.svg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
  <span>{{ localDislikesCount }}</span>
</button>
