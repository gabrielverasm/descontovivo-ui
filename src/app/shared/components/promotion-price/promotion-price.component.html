<span class="promotion-price">
  <strong>{{ promotion.currentPrice | currency: 'BRL' }}</strong>
  @if (promotion.originalPrice || promotion.discountPercentage) {
    <span class="promotion-price__reference">
      @if (promotion.discountPercentage) {
        <small>-{{ promotion.discountPercentage }}%</small>
      }
      @if (promotion.originalPrice) {
        <span>{{ promotion.originalPrice | currency: 'BRL' }}</span>
      }
    </span>
  }
</span>
