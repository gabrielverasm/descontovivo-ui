<span class="promotion-price">
  <strong>{{ promotion.currentPrice | currency: 'BRL' }}</strong>
  <span class="promotion-price__reference" *ngIf="promotion.originalPrice || promotion.discountPercentage">
    <small *ngIf="promotion.discountPercentage">-{{ promotion.discountPercentage }}%</small>
    <span *ngIf="promotion.originalPrice">{{ promotion.originalPrice | currency: 'BRL' }}</span>
  </span>
</span>
