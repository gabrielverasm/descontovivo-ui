<label class="floating-field" [class.floating-field--textarea]="textarea">
  @if (!textarea) {
    <input
      class="floating-field__control"
      [type]="type"
      [name]="name"
      [autocomplete]="autocomplete"
      [required]="required"
      [attr.min]="min"
      [attr.aria-label]="ariaLabel"
      [value]="value"
      placeholder=" "
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
  } @else {
    <textarea
      class="floating-field__control"
      [name]="name"
      [required]="required"
      [rows]="rows"
      [attr.aria-label]="ariaLabel"
      [value]="value"
      placeholder=" "
      (input)="onInput($event)"
      (blur)="onBlur()"
    ></textarea>
  }
  <span class="floating-field__label">{{ label }}</span>
</label>
