<label class="file-field">
  <span>{{ label }}</span>
  <input
    class="file-field__control"
    type="file"
    [name]="name"
    [accept]="accept"
    [required]="required"
    [attr.aria-describedby]="ariaDescribedby"
    (change)="onFileChange($event)"
  />
  @if (hint) {
    <p [id]="ariaDescribedby ?? undefined" class="file-field__hint">{{ hint }}</p>
  }
  @if (error) {
    <p class="file-field__error" role="alert">{{ error }}</p>
  }
  @if (statusText) {
    <p class="file-field__status">{{ statusText }}</p>
  }
  @if (previewUrl) {
    <div class="file-field__preview">
      <img [src]="previewUrl" alt="Prévia da imagem" width="150" height="150" />
      @if (sizeKB !== null) {
        <span class="file-field__size">{{ sizeKB }} KB</span>
      }
    </div>
  }
</label>
