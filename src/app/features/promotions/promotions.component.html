<main class="promotions">
  <section class="promotions__hero" aria-label="Busca de promoções">
    <label class="promotions__search" [class.promotions__search--has-query]="query">
      <input
        type="search"
        name="search"
        [(ngModel)]="query"
        (ngModelChange)="resetVisiblePromotions()"
        placeholder="Pesquise aqui: produto, loja, categoria ou tag."
        aria-label="Pesquisar produto, loja, categoria ou tag"
      />
      <span class="promotions__search-label">Pesquise aqui: produto, loja, categoria ou tag.</span>
    </label>
  </section>

  <section class="promotions__list" aria-label="Lista de promoções aprovadas">
    <div
      *ngFor="let promotion of visiblePromotions"
      class="promotions__item"
      [class.promotions__item--highlighted]="promotion.id === highlightedPromotionId"
      [attr.data-promotion-id]="promotion.id"
    >
      <app-promotion-card [promotion]="promotion" />
    </div>

    <app-empty-state
      *ngIf="!filteredPromotions.length"
      title="Nenhuma promoção encontrada"
      description="Tente buscar por outro produto, loja ou categoria."
    />
  </section>

  <section class="promotions__load-more" *ngIf="filteredPromotions.length" aria-label="Continuar explorando promoções">
    <p>
      Mostrando {{ visiblePromotions.length }} de {{ filteredPromotions.length }} promoções aprovadas.
    </p>
    <button type="button" (click)="loadMorePromotions()" [disabled]="!hasMorePromotions">
      {{ hasMorePromotions ? 'Carregar mais promoções' : 'Todas as promoções foram carregadas' }}
    </button>
  </section>

</main>
