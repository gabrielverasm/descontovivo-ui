<main class="promotions-feed">
  @if (loading) {
    <app-loading-state />
  } @else if (error) {
    <div class="promotions-feed__error" role="alert">{{ error }}</div>
  } @else if (promotions.length === 0) {
    <div class="promotions-feed__empty">
      <p>Nenhuma promoção disponível no momento.</p>
    </div>
  } @else {
    <div class="promotions-feed__list">
      @for (promo of promotions; track promo.id) {
        <app-promotion-card [promotion]="promo" />
      }
    </div>
  }
</main>
