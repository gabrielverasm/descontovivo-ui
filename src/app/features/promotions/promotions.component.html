<main class="promotions-feed">
  @if (loading) {
    <app-loading-state />
  } @else if (error) {
    <div class="promotions-feed__error" role="alert">{{ error }}</div>
  } @else if (promotions.length === 0) {
    <div class="promotions-feed__empty">
      <p>Nenhuma promoção disponível no momento.</p>
    </div>
  } @else {
    <div class="promotions-feed__list">
      @for (promo of promotions; track promo.id) {
        <app-promotion-card [promotion]="promo" />
      }
    </div>

    @if (hasMore || loadMoreError) {
      <div class="promotions-feed__load-more">
        @if (loadMoreError) {
          <p class="promotions-feed__load-more-error" role="alert">{{ loadMoreError }}</p>
        }
        @if (hasMore) {
          <button
            type="button"
            class="promotions-feed__load-more-btn"
            [disabled]="loadingMore"
            (click)="loadMore()"
          >
            @if (loadingMore) {
              Carregando…
            } @else {
              Carregar mais promoções
            }
          </button>
        }
      </div>
    }
  }
</main>
