<main class="publish">
  <app-page-header
    eyebrow="Envio de oferta"
    title="Publicar promoção"
    description="Este formulário é um placeholder do MVP. No produto final, apenas usuários cadastrados poderão enviar ofertas, que entram como pendentes até a aprovação."
  />

  <form class="publish__form" aria-label="Formulário de publicação de promoção">
    <label>
      <span>Título</span>
      <input [(ngModel)]="title" name="title" type="text" placeholder="Ex.: Monitor 27 QHD" />
    </label>

    <label>
      <span>Link da loja</span>
      <input name="storeUrl" type="url" placeholder="https://..." />
    </label>

    <label>
      <span>Preço atual</span>
      <input name="currentPrice" type="number" min="0" placeholder="0,00" />
    </label>

    <label>
      <span>Descrição</span>
      <textarea
        name="description"
        rows="5"
        placeholder="Conte por que a oferta vale a pena"
      ></textarea>
    </label>

    <button type="button">Enviar para moderação</button>
  </form>
</main>
