<main class="publish">
  <app-breadcrumb [items]="[{ label: 'Promoções', route: '/promocoes' }, { label: 'Publicar' }]" />

  <div class="publish__content">
    <section class="publish__main" aria-label="Publicar oferta">
      <form class="publish__card" aria-label="Formulário de publicação de promoção">
        <app-floating-field
          class="publish__link"
          label="Link da oferta *"
          name="storeUrl"
          type="url"
          [required]="true"
        />

        <app-floating-field
          label="Título do produto em oferta"
          name="title"
          type="text"
          [(ngModel)]="title"
        />

        <app-floating-field
          label="Preço"
          name="currentPrice"
          type="number"
          [min]="0"
        />

        <app-file-field
          label="Imagem do produto"
          name="imageFile"
          accept="image/*"
        />
      </form>
    </section>

    <aside class="publish__side" aria-label="Como publicar uma oferta">
      <div class="publish__tips">
        <strong>Dicas rápidas</strong>
        <ul class="publish__tips-list">
          <li>Use o link direto do produto, sem encurtadores.</li>
          <li>Confira se a promoção ainda está ativa antes de enviar.</li>
          <li>Ofertas enviadas ficam pendentes até serem aprovadas.</li>
        </ul>
      </div>
    </aside>
  </div>
</main>
