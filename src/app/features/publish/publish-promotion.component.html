<main class="publish">
  <nav class="page-breadcrumb" aria-label="Breadcrumb">
    <a routerLink="/promocoes">Promoções</a>
    <span aria-hidden="true">&gt;</span>
    <span>Publicar</span>
  </nav>

  <div class="publish__content">
    <section class="publish__main" aria-label="Publicar oferta">
      <form class="publish__card" aria-label="Formulário de publicação de promoção">
        <label class="dv-floating-field publish__link">
          <input class="dv-floating-field__control" name="storeUrl" type="url" placeholder=" " />
          <span class="dv-floating-field__label">Link da oferta</span>
        </label>

        <div class="publish__optional">
          <label class="dv-floating-field">
            <input
              class="dv-floating-field__control"
              [(ngModel)]="title"
              name="title"
              type="text"
              placeholder=" "
            />
            <span class="dv-floating-field__label">Título do produto em oferta</span>
          </label>
          <label class="dv-floating-field">
            <input
              class="dv-floating-field__control"
              name="currentPrice"
              type="number"
              min="0"
              placeholder=" "
            />
            <span class="dv-floating-field__label">Preço</span>
          </label>
          <label class="dv-file-field">
            <span>Carregar imagem</span>
            <input class="dv-file-field__control" name="imageFile" type="file" accept="image/*" />
            <strong>Selecionar imagem</strong>
          </label>
        </div>
      </form>
    </section>

    <aside class="publish__side" aria-label="Como publicar uma oferta">
      <div class="publish__tips">
        <strong>Dicas rápidas</strong>
        <p>
          Use o link direto do produto, evite links encurtados e confira se a promoção ainda está
          ativa. Preço e imagem podem ser ajustados depois.
        </p>
      </div>
    </aside>
  </div>
</main>
