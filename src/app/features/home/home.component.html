<main class="home">
  <section class="home__hero">
    <app-page-header
      eyebrow="DescontoVivo"
      title="Promoções aprovadas pela comunidade"
      description="Um feed simples para descobrir ofertas reais, com publicação enviada por usuários cadastrados e liberada apenas depois da moderação."
    />

    <div class="home__actions" aria-label="Ações principais">
      <a class="button button--primary" routerLink="/promocoes">Ver promoções</a>
      <a class="button button--ghost" routerLink="/publicar">Publicar oferta</a>
    </div>
  </section>

  <section class="home__feed" aria-labelledby="home-feed-title">
    <div class="home__section-heading">
      <h2 id="home-feed-title">Ofertas em destaque</h2>
      <a routerLink="/promocoes">Ver todas</a>
    </div>

    <div class="home__list" *ngIf="featuredPromotions.length; else emptyFeed">
      <app-promotion-card *ngFor="let promotion of featuredPromotions" [promotion]="promotion" />
    </div>

    <ng-template #emptyFeed>
      <app-empty-state
        title="Nenhuma promoção aprovada"
        description="As ofertas enviadas aparecem aqui depois da moderação."
      />
    </ng-template>
  </section>
</main>
