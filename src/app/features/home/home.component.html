<main class="home">
  <section class="home__hero">
    <app-page-header
      eyebrow="DescontoVivo"
      title="Promocoes aprovadas pela comunidade"
      description="Um feed simples para descobrir ofertas reais, com publicacao enviada por usuarios cadastrados e liberada apenas depois da moderacao."
    />

    <div class="home__actions" aria-label="Acoes principais">
      <a class="button button--primary" routerLink="/promocoes">Ver promocoes</a>
      <a class="button button--ghost" routerLink="/publicar">Publicar oferta</a>
    </div>
  </section>

  <section class="home__feed" aria-labelledby="home-feed-title">
    <div class="home__section-heading">
      <h2 id="home-feed-title">Ofertas em destaque</h2>
      <a routerLink="/promocoes">Ver todas</a>
    </div>

    <div class="home__list" *ngIf="featuredPromotions.length; else emptyFeed">
      <app-promotion-card
        *ngFor="let promotion of featuredPromotions"
        [promotion]="promotion"
      />
    </div>

    <ng-template #emptyFeed>
      <app-empty-state
        title="Nenhuma promocao aprovada"
        description="As ofertas enviadas aparecem aqui depois da moderacao."
      />
    </ng-template>
  </section>
</main>
