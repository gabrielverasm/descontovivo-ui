<main class="auth-page">
  <app-breadcrumb [items]="[{ label: 'Promoções', route: '/promocoes' }, { label: 'Entrar ou criar conta' }]" />

  <div class="auth-page__content">
    <section class="auth-page__card" aria-label="Entrar ou criar conta no DescontoVivo">
      <header>
        <h1>Entrar ou criar conta</h1>
        <p>Crie uma conta grátis para publicar, comentar e votar em promoções.</p>
      </header>

      <div class="auth-page__benefits" aria-label="Benefícios da conta">
        <p>Com uma conta grátis, você pode:</p>
        <ul>
          <li>Publicar ofertas</li>
          <li>Comentar promoções</li>
          <li>Votar em preços</li>
          <li>Acompanhar oportunidades</li>
        </ul>
      </div>

      <div class="auth-page__actions">
        <button type="button" class="auth-page__btn auth-page__btn--primary" (click)="register()">Criar conta grátis</button>
        <button type="button" class="auth-page__btn auth-page__btn--secondary" (click)="login()">Entrar com conta segura</button>
      </div>

      <p class="auth-page__microcopy">Você será redirecionado para nosso provedor seguro de identidade.</p>
    </section>
  </div>
</main>
