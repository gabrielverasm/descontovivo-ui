<main class="auth-page">
  <app-breadcrumb [items]="[{ label: 'Promoções', route: '/promocoes' }, { label: 'Entrar' }]" />

  <div class="auth-page__content">
    <section class="auth-page__card" aria-label="Entrar no DescontoVivo">
      <header>
        <h1>Entrar no DescontoVivo</h1>
        <span>Acesse sua conta para publicar, votar e comentar ofertas.</span>
      </header>

      <form class="auth-page__form" aria-label="Formulário de login">
        <app-floating-field
          label="E-mail"
          name="email"
          type="email"
          autocomplete="email"
        />

        <app-floating-field
          label="Senha"
          name="password"
          type="password"
          autocomplete="current-password"
        />

        <div class="auth-page__row">
          <label class="auth-page__remember">
            <input type="checkbox" name="remember" />
            <span>Lembrar de mim</span>
          </label>
          <a routerLink="/login">Esqueci minha senha</a>
        </div>

        <button type="button">Entrar</button>
      </form>
    </section>

    <aside class="auth-page__signup" aria-labelledby="login-signup-title">
      <h2 id="login-signup-title">Crie sua conta para participar</h2>
      <span>Publique, vote e acompanhe promoções com a comunidade.</span>

      <div class="auth-page__benefit-grid">
        <span>Publicar ofertas</span>
        <span>Comentar promoções</span>
        <span>Votar em preços</span>
        <span>Acompanhar oportunidades</span>
      </div>

      <a class="auth-page__signup-link" routerLink="/cadastro">Cadastrar</a>
    </aside>
  </div>
</main>
