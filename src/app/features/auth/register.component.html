<main class="auth-page">
  <nav class="page-breadcrumb" aria-label="Breadcrumb">
    <a routerLink="/promocoes">Promoções</a>
    <span aria-hidden="true">/</span>
    <span>Cadastro</span>
  </nav>

  <div class="auth-page__content">
    <section class="auth-page__main" aria-labelledby="register-title">
      <form class="auth-page__card" aria-label="Formulário de cadastro">
        <header>
          <h1 id="register-title">Criar conta</h1>
          <p>Entre na comunidade para publicar, votar e comentar ofertas.</p>
        </header>

        <label class="dv-floating-field">
          <input
            class="dv-floating-field__control"
            type="text"
            name="name"
            autocomplete="name"
            placeholder=" "
          />
          <span class="dv-floating-field__label">Nome</span>
        </label>

        <label class="dv-floating-field">
          <input
            class="dv-floating-field__control"
            type="email"
            name="email"
            autocomplete="email"
            placeholder=" "
          />
          <span class="dv-floating-field__label">E-mail</span>
        </label>

        <label class="dv-floating-field">
          <input
            class="dv-floating-field__control"
            type="password"
            name="password"
            autocomplete="new-password"
            placeholder=" "
            #passwordInput
            (input)="onPasswordInput(passwordInput.value)"
          />
          <span class="dv-floating-field__label">Senha</span>
        </label>

        <div class="auth-page__password-strength" aria-live="polite">
          <div class="auth-page__password-bar">
            <span [class]="'auth-page__password-segment auth-page__password-segment--' + passwordStrength"></span>
            <span [class]="'auth-page__password-segment auth-page__password-segment--' + (passwordStrength >= 2 ? passwordStrength : 0)"></span>
            <span [class]="'auth-page__password-segment auth-page__password-segment--' + (passwordStrength >= 3 ? passwordStrength : 0)"></span>
          </div>
          <span class="auth-page__password-hint">{{ passwordHint }}</span>
        </div>

        <label class="dv-file-field">
          <span>Adicionar foto da logo</span>
          <input
            class="dv-file-field__control"
            type="file"
            name="logo"
            accept="image/png,image/jpeg,image/webp"
            aria-describedby="logo-help"
          />
          <p id="logo-help" class="dv-file-field__hint">
            PNG, JPG ou WebP &middot; máx. 200 KB e 512&times;512 px
          </p>
        </label>

        <button type="button">Criar conta</button>
      </form>
    </section>

    <aside class="auth-page__side" aria-label="Acesso">
      <div>
        <strong>Já tem conta?</strong>
        <p>Acesse para acompanhar suas publicações, votos e comentários.</p>
        <a routerLink="/login">Entrar</a>
      </div>
    </aside>
  </div>
</main>
