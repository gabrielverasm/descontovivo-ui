<main class="auth-page">
  <app-page-header
    eyebrow="Cadastro"
    title="Criar conta"
    description="No MVP, o cadastro indica a regra de produto: somente usuários cadastrados poderão enviar promoções."
  />

  <form class="auth-page__form" aria-label="Formulário de cadastro">
    <label>
      <span>Nome</span>
      <input type="text" name="name" autocomplete="name" />
    </label>

    <label>
      <span>E-mail</span>
      <input type="email" name="email" autocomplete="email" />
    </label>

    <label>
      <span>Senha</span>
      <input type="password" name="password" autocomplete="new-password" />
    </label>

    <button type="button">Criar conta</button>
  </form>

  <p class="auth-page__hint">Já tem conta? <a routerLink="/login">Entrar</a></p>
</main>
