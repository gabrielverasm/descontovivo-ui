<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>DescontoVivo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="theme-color" name="theme-color" content="#f6f8fb" />
    <meta
      name="description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site."
    />
    <meta property="og:title" content="DescontoVivo" />
    <meta
      property="og:description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site."
    />
    <meta property="og:image" content="https://descontovivo.com/brand/logo-og-image.png" />
    <meta property="og:url" content="https://descontovivo.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DescontoVivo" />
    <meta
      name="twitter:description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site."
    />
    <meta name="twitter:image" content="https://descontovivo.com/brand/logo-og-image.png" />
    <link rel="canonical" href="https://descontovivo.com/" />
    <link id="favicon-any" rel="icon" href="/favicon-light.ico" sizes="any" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/icon-light-16.png" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/icon-light-32.png" />
    <link id="apple-touch-icon" rel="apple-touch-icon" sizes="180x180" href="/icon-light-180.png" />
    <link id="site-manifest" rel="manifest" href="/site-light.webmanifest" />
    <script>
      (function () {
        var faviconSets = {
          light: {
            ico: '/favicon-light.ico',
            icon16: '/icon-light-16.png',
            icon32: '/icon-light-32.png',
            apple: '/icon-light-180.png',
            manifest: '/site-light.webmanifest',
            themeColor: '#f6f8fb'
          },
          dark: {
            ico: '/favicon-dark.ico',
            icon16: '/icon-dark-16.png',
            icon32: '/icon-dark-32.png',
            apple: '/icon-dark-180.png',
            manifest: '/site-dark.webmanifest',
            themeColor: '#061a3d'
          }
        };

        function setHref(id, href) {
          var element = document.getElementById(id);

          if (element) {
            element.setAttribute('href', href);
          }
        }

        function setContent(id, content) {
          var element = document.getElementById(id);

          if (element) {
            element.setAttribute('content', content);
          }
        }

        function updateDescontoVivoFavicons(isDarkMode) {
          var iconSet = isDarkMode ? faviconSets.dark : faviconSets.light;

          setHref('favicon-any', iconSet.ico);
          setHref('favicon-16', iconSet.icon16);
          setHref('favicon-32', iconSet.icon32);
          setHref('apple-touch-icon', iconSet.apple);
          setHref('site-manifest', iconSet.manifest);
          setContent('theme-color', iconSet.themeColor);
        }

        var darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        updateDescontoVivoFavicons(darkModeQuery.matches);

        if (darkModeQuery.addEventListener) {
          darkModeQuery.addEventListener('change', function (event) {
            updateDescontoVivoFavicons(event.matches);
          });
        } else if (darkModeQuery.addListener) {
          darkModeQuery.addListener(function (event) {
            updateDescontoVivoFavicons(event.matches);
          });
        }

        window.updateDescontoVivoFavicons = updateDescontoVivoFavicons;
      })();
    </script>

    <meta name="robots" content="noindex, nofollow, noarchive" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
