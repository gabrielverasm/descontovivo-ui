<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="theme-color" name="theme-color" content="#f6f8fb" />
    <meta
      name="description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site. Encontre descontos em tecnologia, casa, mercado e mais."
    />
    <meta property="og:site_name" content="DescontoVivo" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="DescontoVivo: Promoções e ofertas compartilhadas pela comunidade" />
    <meta
      property="og:description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site. Encontre descontos em tecnologia, casa, mercado e mais."
    />
    <meta property="og:image" content="https://descontovivo.com/brand/logo-og-image.jpg" />
    <meta property="og:url" content="https://descontovivo.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DescontoVivo: Promoções" />
    <meta
      name="twitter:description"
      content="DescontoVivo reúne promoções compartilhadas pela comunidade, com ofertas revisadas antes de aparecerem no site. Encontre descontos em tecnologia, casa, mercado e mais."
    />
    <meta name="twitter:image" content="https://descontovivo.com/brand/logo-og-image.jpg" />
    <link id="favicon-any" rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link id="apple-touch-icon" rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link id="site-manifest" rel="manifest" href="/site.webmanifest" />
    <script>
      (function () {
        var faviconSets = {
          light: {
            ico: '/favicon.ico',
            apple: '/apple-touch-icon.png',
            manifest: '/site.webmanifest',
            themeColor: '#f6f8fb'
          },
          dark: {
            ico: '/favicon-dark.ico',
            apple: '/apple-touch-icon-dark.png',
            manifest: '/site-dark.webmanifest',
            themeColor: '#061a3d'
          }
        };

        function setHref(id, href) {
          var element = document.getElementById(id);

          if (element) {
            element.setAttribute('href', href);
          }
        }

        function setContent(id, content) {
          var element = document.getElementById(id);

          if (element) {
            element.setAttribute('content', content);
          }
        }

        function updateDescontoVivoFavicons(isDarkMode) {
          var iconSet = isDarkMode ? faviconSets.dark : faviconSets.light;

          setHref('favicon-any', iconSet.ico);
          setHref('apple-touch-icon', iconSet.apple);
          setHref('site-manifest', iconSet.manifest);
          setContent('theme-color', iconSet.themeColor);
        }

        var darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        updateDescontoVivoFavicons(darkModeQuery.matches);

        if (darkModeQuery.addEventListener) {
          darkModeQuery.addEventListener('change', function (event) {
            updateDescontoVivoFavicons(event.matches);
          });
        } else if (darkModeQuery.addListener) {
          darkModeQuery.addListener(function (event) {
            updateDescontoVivoFavicons(event.matches);
          });
        }

        window.updateDescontoVivoFavicons = updateDescontoVivoFavicons;
      })();
    </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
